<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeSaver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; }
        .container { max-width: 500px; margin-top: 60px; }
        .spinner-border { display: none; }
        #loading { display: none; }
    </style>
</head>
<body>
<div class="container shadow rounded p-4 bg-white">
    <h2 class="mb-4 text-center">TubeSaver</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-warning">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form id="downloadForm" method="post">
        <div class="mb-3">
            <label for="url" class="form-label">URL do vídeo</label>
            <input type="url" class="form-control" id="url" name="url" placeholder="Cole a URL do YouTube aqui" required>
        </div>
        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo de exportação</label>
            <select class="form-select" id="tipo" name="tipo" required>
                <option value="mp3">Áudio (MP3)</option>
                <option value="mp4">Vídeo (MP4)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Extrair</button>
    </form>
    <div id="loading" class="text-center mt-4">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
        <p class="mt-2">Extraindo, aguarde...</p>
    </div>

        {% if download_url %}
        <div class="alert alert-success mt-4 text-center" id="download-success-box">
                <span class="fw-bold">Extração concluída!</span> <br>
                <a href="{{ download_url }}" target="_blank" class="btn btn-success mt-2" id="download-btn">Clique aqui para baixar</a>
                <br><small>O arquivo será removido após o download.</small>
        </div>
        <script>
            const btn = document.getElementById('download-btn');
            if (btn) {
                btn.addEventListener('click', function() {
                    const box = document.getElementById('download-success-box');
                    if (box) box.remove();
                });
            }
        </script>
        {% endif %}
</div>
<script>
    const form = document.getElementById('downloadForm');
    form.addEventListener('submit', function() {
        document.getElementById('loading').style.display = 'block';
    });
</script>
</body>
</html>
